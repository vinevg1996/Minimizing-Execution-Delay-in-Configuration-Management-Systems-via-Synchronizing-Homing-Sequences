- name: Check if text.txt exists with timing
  hosts: myhosts
  gather_facts: false
  tasks:
    - name: Record start time (file check)
      ansible.builtin.command: date +%s%N
      register: start_check

    - name: Check file status
      ansible.builtin.stat:
        path: /home/vinevg1996/work_france/rtas26/ansible_quickstart/text.txt
      register: file_status

    - name: Record end time (file check)
      ansible.builtin.command: date +%s%N
      register: end_check

    - name: Print file existence result
      ansible.builtin.debug:
        msg: >
          File text.txt is {{
            'PRESENT' if file_status.stat.exists else 'NOT present'
          }}

    - name: Print check execution time
      ansible.builtin.debug:
        msg: >
          file check task time: {{
            ((end_check.stdout | int) - (start_check.stdout | int)) / 1000000
          }} ms


